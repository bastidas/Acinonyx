# Minimal install (matches: pip install -e .)
# Most of the UI works; for full functionality use environment-all.yml or run: pip install -e ".[all]"
name: acinonyx
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  - pip>=21.3
  - setuptools>=64.0.0
  - git
  - numpy=2.2.5
  - scipy>=1.7.3
  - matplotlib>=3.4.0
  - seaborn>=0.12.2
  - networkx
  - uvicorn
  - fastapi
  - pydantic=2.12.4
  - scikit-learn>=1.5.2
  - pytest>=4.3.1
  - pytest-cov>=2.6.1
  - pytest-asyncio
  - pre-commit
  - black
  - pip:
    - pylinkage
    - shapely>=2.1.2
    - pyscipopt
    - -e .
